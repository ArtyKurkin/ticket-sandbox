services:
  db:
    image: postgres:16
    container_name: ticket-sandbox-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ticket_sandbox
      POSTGRES_USER: ticket_sandbox_user
      POSTGRES_PASSWORD: ticket_sandbox_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: