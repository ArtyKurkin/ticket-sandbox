worker_processes 1;

error_log logs/nginx-error.log;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log logs/nginx-access.log;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Example upstream.
    # Для production можно заменить 127.0.0.1:8000 на unix socket
    # или внутренний адрес WSGI/ASGI-сервера.
    upstream ticket_sandbox_app {
        server 127.0.0.1:8000;
    }

    server {
        listen 8081;
        server_name localhost;

        client_max_body_size 20m;

        location / {
            proxy_pass http://ticket_sandbox_app;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/terminal/(?<attempt_id>[0-9]+)/(?<terminal_port>2[0-9][0-9][0-9][0-9]|30000)/ {
            auth_request /_terminal_auth;

            proxy_pass http://127.0.0.1:$terminal_port;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        location = /_terminal_auth {
            internal;

            proxy_pass http://ticket_sandbox_app/terminal-auth/;

            proxy_pass_request_body off;
            proxy_set_header Content-Length "";

            proxy_set_header Cookie $http_cookie;
            proxy_set_header Host $http_host;
            proxy_set_header X-Original-URI $request_uri;
        }
    }
}