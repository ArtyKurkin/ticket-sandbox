name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test-secret-key
      DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      DB_NAME: ":memory:"
      TERMINAL_GATEWAY_ENABLED: "true"
      CHECK_TASK_TIMEOUT_SECONDS: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check

      - name: Django deploy check
        env:
          SECRET_KEY: "ci-deploy-check-secret-key-with-enough-length-and-variety-2026"
          DEBUG: "False"
          ALLOWED_HOSTS: "example.com"
          CSRF_TRUSTED_ORIGINS: "https://example.com"
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"
          TERMINAL_GATEWAY_ENABLED: "true"
          CHECK_TASK_TIMEOUT_SECONDS: "60"
        run: python manage.py check --deploy

      - name: Check training tasks sync
        env:
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ci-sync-check.sqlite3
        run: |
          python manage.py migrate --noinput
          python manage.py sync_training_tasks --dry-run --strict

      - name: Run tests
        run: python manage.py test sandbox

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: tests

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key

          ssh-keyscan -p "${{ secrets.STAGING_PORT }}" "${{ secrets.STAGING_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to staging
        run: |
          set -e

          echo "## Staging deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          run_remote_step() {
            local title="$1"
            local command="$2"

            echo "▶️ ${title}"

            if ssh \
              -i ~/.ssh/staging_key \
              -p "${{ secrets.STAGING_PORT }}" \
              -o IdentitiesOnly=yes \
              -o StrictHostKeyChecking=yes \
              "${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }}" \
              "${command}"
            then
              echo "- ✅ ${title}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ❌ ${title}" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          }

          run_as_app_user() {
            local title="$1"
            local command="$2"

            run_remote_step "${title}" "set -e; runuser -u ticket-sandbox -- bash -lc 'set -e; cd /opt/ticket-sandbox; set -a; . /opt/ticket-sandbox/.env; set +a; . .venv/bin/activate; ${command}'"
          }

          run_local_step() {
            local title="$1"
            local command="$2"

            echo "▶️ ${title}"

            if bash -lc "${command}"
            then
              echo "- ✅ ${title}" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ❌ ${title}" >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          }

          run_as_app_user \
            "Pull latest code" \
            "GIT_SSH_COMMAND=\"ssh -i /root/.ssh/ticket_sandbox_deploy -o IdentitiesOnly=yes\" git pull --ff-only"

          run_as_app_user \
            "Run migrations" \
            "python manage.py migrate --noinput"

          run_as_app_user \
            "Sync training tasks in strict mode" \
            "python manage.py sync_training_tasks --strict"

          run_as_app_user \
            "Build task images" \
            "python manage.py build_task_images"

          run_as_app_user \
            "Collect static files" \
            "python manage.py collectstatic --noinput"

          run_remote_step \
            "Restart ticket-sandbox service" \
            "set -e; systemctl restart ticket-sandbox"

          run_remote_step \
            "Check ticket-sandbox service status" \
            "set -e; systemctl status ticket-sandbox --no-pager"

          run_local_step \
            "Check staging homepage" \
            "curl -fsSI '${{ secrets.STAGING_URL }}/' > /dev/null"

          run_local_step \
            "Check staging healthz" \
            "curl -fsSI '${{ secrets.STAGING_URL }}/healthz/' > /dev/null"

          run_local_step \
            "Check staging admin login" \
            "curl -fsSI '${{ secrets.STAGING_URL }}/admin/login/' > /dev/null"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Staging deploy finished successfully." >> "$GITHUB_STEP_SUMMARY"
